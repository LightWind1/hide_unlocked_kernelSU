<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hide Unlocked</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17191f;
      --muted: #666d7c;
      --line: #dfe3eb;
      --ok: #157f52;
      --bad: #bb2f3b;
      --warn: #936400;
      --chip: #edf1f7;
      --button: #1d5fd1;
      --button-text: #ffffff;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101216;
        --panel: #191d24;
        --text: #f1f3f7;
        --muted: #a1a8b6;
        --line: #303642;
        --ok: #62d59b;
        --bad: #ff7a86;
        --warn: #e6bd56;
        --chip: #262c36;
        --button: #72a7ff;
        --button-text: #07111f;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      letter-spacing: 0;
    }

    main {
      width: min(100%, 820px);
      margin: 0 auto;
      padding: 18px 14px 28px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 720;
    }

    .meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      min-width: 44px;
      min-height: 40px;
      border: 0;
      border-radius: 7px;
      padding: 0 14px;
      background: var(--button);
      color: var(--button-text);
      font: inherit;
      font-weight: 650;
    }

    button:disabled { opacity: .48; }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
      min-width: 0;
    }

    .metric strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
    }

    .metric span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .list {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel);
      margin-top: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(74px, .55fr) minmax(88px, .65fr) 74px;
      gap: 8px;
      align-items: center;
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
    }

    .row:last-child { border-bottom: 0; }

    .prop,
    .expected,
    .value {
      min-width: 0;
      overflow-wrap: anywhere;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }

    .expected,
    .value { color: var(--muted); }

    .status {
      justify-self: end;
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--chip);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    .warn { color: var(--warn); }

    .foot {
      margin: 12px 2px 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    @media (max-width: 560px) {
      main { padding: 14px 10px 22px; }
      header { align-items: flex-start; }
      .summary { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr auto; }
      .expected,
      .value { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Hide Unlocked</h1>
        <div class="meta">KernelSU / SukiSU Ultra · v1.2</div>
      </div>
      <div class="actions">
        <button id="repair" type="button" disabled>重新执行</button>
        <button id="refresh" type="button">刷新</button>
      </div>
    </header>

    <section class="summary" aria-label="prop summary">
      <div class="metric"><strong id="ok-count">0</strong><span>符合预期</span></div>
      <div class="metric"><strong id="bad-count">0</strong><span>需要关注</span></div>
      <div class="metric"><strong id="all-count">0</strong><span>检测项目</span></div>
    </section>

    <div id="content"></div>
    <div class="foot" id="message">正在读取属性...</div>
  </main>

  <script type="module">
    const checks = [
      ["ro.boot.flash.locked", "1"],
      ["ro.boot.vbmeta.device_state", "locked"],
      ["ro.boot.verifiedbootstate", "green"],
      ["ro.boot.veritymode", "enforcing"],
      ["ro.boot.verifiedmode", "enforcing"],
      ["vendor.boot.vbmeta.device_state", "locked"],
      ["vendor.boot.verifiedbootstate", "green"],
      ["vendor.boot.veritymode", "enforcing"],
      ["ro.build.tags", "release-keys"],
      ["ro.build.type", "user"],
      ["ro.debuggable", "0"],
      ["ro.force.debuggable", "0"],
      ["ro.secure", "1"],
      ["ro.adb.secure", "1"],
      ["sys.oem_unlock_allowed", "0"],
      ["ro.oem_unlock_supported", "1"],
      ["ro.boot.warranty_bit", "0"],
      ["ro.vendor.boot.warranty_bit", "0"],
      ["ro.vendor.warranty_bit", "0"],
      ["ro.warranty_bit", "0"],
      ["ro.secureboot.devicelock", "1"],
      ["ro.secureboot.lockstate", "locked"],
      ["ro.boot.realmebootstate", "green"],
      ["ro.boot.realme.lockstate", "1"],
      ["ro.bootmode", "unknown"],
      ["ro.boot.bootmode", "unknown"],
      ["ro.boot.mode", "unknown"],
      ["vendor.boot.bootmode", "unknown"],
      ["vendor.boot.mode", "unknown"]
    ];

    const content = document.querySelector("#content");
    const message = document.querySelector("#message");
    const okCount = document.querySelector("#ok-count");
    const badCount = document.querySelector("#bad-count");
    const allCount = document.querySelector("#all-count");
    const refresh = document.querySelector("#refresh");
    const repair = document.querySelector("#repair");

    let execApi = null;
    let apiSource = "";
    let failedChecks = [];

    async function loadApi() {
      if (execApi) return execApi;

      const candidates = [];
      try {
        const api = await import("kernelsu");
        candidates.push(["module:kernelsu", api], ["module:kernelsu.default", api.default]);
      } catch (error) {
        candidates.push(["module:kernelsu", null, error]);
      }

      candidates.push(
        ["window.kernelsu", window.kernelsu],
        ["window.ksu", window.ksu],
        ["window.KernelSU", window.KernelSU],
        ["window.apatch", window.apatch],
        ["window.APatch", window.APatch]
      );

      const errors = [];
      for (const [name, api, error] of candidates) {
        if (error) {
          errors.push(name + ": " + (error.message || error));
          continue;
        }
        if (api && typeof api.exec === "function") {
          apiSource = name + ".exec";
          execApi = api.exec.bind(api);
          return execApi;
        }
        if (api && typeof api.execCommand === "function") {
          apiSource = name + ".execCommand";
          execApi = api.execCommand.bind(api);
          return execApi;
        }
        if (api) errors.push(name + ": exec unavailable");
      }

      throw new Error("未找到可用 WebUI exec 接口。" + errors.join("; "));
    }

    function shellQuote(value) {
      return "'" + value.replace(/'/g, "'\\''") + "'";
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function normalizeResult(result, command) {
      if (typeof result === "string") {
        try {
          result = JSON.parse(result);
        } catch (error) {
          return { errno: 0, stdout: result, stderr: "" };
        }
      }

      if (!result || typeof result !== "object") {
        return { errno: 0, stdout: String(result ?? ""), stderr: "" };
      }

      const errno = Number(result.errno ?? result.code ?? result.exitCode ?? 0);
      const stdout = String(result.stdout ?? result.out ?? result.output ?? "");
      const stderr = String(result.stderr ?? result.err ?? "");
      if (errno !== 0) throw new Error(stderr || command + " failed with errno " + errno);
      return { errno, stdout, stderr };
    }

    async function run(command) {
      const exec = await loadApi();
      const result = normalizeResult(await exec(command), command);
      return result.stdout.trim();
    }

    function row(prop, expected, actual) {
      const matches = actual === expected;
      const missing = actual === "";
      const statusText = matches ? "正常" : missing ? "空值" : "异常";
      const statusClass = matches ? "ok" : missing ? "warn" : "bad";
      return `
        <div class="row">
          <div class="prop">${escapeHtml(prop)}</div>
          <div class="expected">${escapeHtml(expected)}</div>
          <div class="value">${escapeHtml(actual || "(empty)")}</div>
          <div class="status ${statusClass}">${statusText}</div>
        </div>
      `;
    }

    async function render() {
      refresh.disabled = true;
      repair.disabled = true;
      message.textContent = "正在读取属性...";
      failedChecks = [];
      const rows = [];
      let ok = 0;
      let bad = 0;

      try {
        for (const [prop, expected] of checks) {
          const actual = await run("getprop " + shellQuote(prop));
          if (actual === expected) {
            ok += 1;
          } else {
            bad += 1;
            if (actual !== "") failedChecks.push([prop, expected]);
          }
          rows.push(row(prop, expected, actual));
        }

        content.innerHTML = `<section class="list">${rows.join("")}</section>`;
        okCount.textContent = String(ok);
        badCount.textContent = String(bad);
        allCount.textContent = String(checks.length);
        repair.disabled = failedChecks.length === 0;
        message.textContent = failedChecks.length === 0
          ? "全部可修复项目符合预期 · " + apiSource + " · " + new Date().toLocaleString()
          : "有非空属性不符合预期，可重新执行一次 · " + apiSource + " · " + new Date().toLocaleString();
      } catch (error) {
        content.innerHTML = "";
        okCount.textContent = "0";
        badCount.textContent = "0";
        allCount.textContent = String(checks.length);
        message.textContent = "读取失败：" + (error.message || "unknown error");
      } finally {
        refresh.disabled = false;
      }
    }

    async function repairFailed() {
      if (failedChecks.length === 0) return;
      refresh.disabled = true;
      repair.disabled = true;
      message.textContent = "正在重新执行异常项...";

      try {
        for (const [prop, expected] of failedChecks) {
          await run("resetprop " + shellQuote(prop) + " " + shellQuote(expected));
        }
        await render();
      } catch (error) {
        message.textContent = "重新执行失败：" + (error.message || "unknown error");
        refresh.disabled = false;
        repair.disabled = false;
      }
    }

    refresh.addEventListener("click", render);
    repair.addEventListener("click", repairFailed);
    render();
  </script>
</body>
</html>
